<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bgc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1733"/>
      <stop offset="100%" stop-color="#101c33"/>
    </linearGradient>
    <radialGradient id="glowc" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bgc)"/>
  <ellipse cx="200" cy="110" rx="140" ry="85" fill="url(#glowc)"/>
  <!-- three orbiting agents around a core -->
  <circle cx="200" cy="115" r="16" fill="#0b1733" stroke="#00e5ff" stroke-width="1.5"/>
  <circle cx="200" cy="115" r="7" fill="#00e5ff" opacity="0.85"/>
  <ellipse cx="200" cy="115" rx="85" ry="34" fill="none" stroke="#34d399" stroke-width="0.8" opacity="0.35" transform="rotate(-18 200 115)"/>
  <ellipse cx="200" cy="115" rx="110" ry="46" fill="none" stroke="#f9a826" stroke-width="0.8" opacity="0.3" transform="rotate(12 200 115)"/>
  <ellipse cx="200" cy="115" rx="132" ry="58" fill="none" stroke="#c084fc" stroke-width="0.8" opacity="0.25" transform="rotate(-6 200 115)"/>
  <circle cx="127" cy="88" r="7" fill="#34d399"/>
  <circle cx="303" cy="140" r="7" fill="#f9a826"/>
  <circle cx="88" cy="146" r="7" fill="#c084fc"/>
  <!-- clock ticks: they run on schedule -->
  <g stroke="#8aa0c8" stroke-width="1" opacity="0.5">
    <line x1="340" y1="42" x2="340" y2="50"/>
    <line x1="356" y1="58" x2="348" y2="58"/>
    <line x1="340" y1="74" x2="340" y2="66"/>
    <line x1="324" y1="58" x2="332" y2="58"/>
  </g>
  <circle cx="340" cy="58" r="16" fill="none" stroke="#8aa0c8" stroke-width="1" opacity="0.5"/>
  <line x1="340" y1="58" x2="340" y2="48" stroke="#00e5ff" stroke-width="1.5"/>
  <line x1="340" y1="58" x2="347" y2="61" stroke="#00e5ff" stroke-width="1.5"/>
  <text x="24" y="212" font-family="monospace" font-size="11" fill="#8aa0c8" opacity="0.8">runs whether i show up or not</text>
</svg>

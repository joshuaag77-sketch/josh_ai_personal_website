<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bg)" rx="0"/>

  <!-- Notebook lines -->
  <line x1="80" y1="60" x2="320" y2="60" stroke="#334155" stroke-width="1"/>
  <line x1="80" y1="90" x2="320" y2="90" stroke="#334155" stroke-width="1"/>
  <line x1="80" y1="120" x2="320" y2="120" stroke="#334155" stroke-width="1"/>
  <line x1="80" y1="150" x2="320" y2="150" stroke="#334155" stroke-width="1"/>
  <line x1="80" y1="180" x2="320" y2="180" stroke="#334155" stroke-width="1"/>

  <!-- Written text lines (abstract) -->
  <rect x="80" y="54" width="140" height="4" rx="2" fill="#60a5fa" opacity="0.7"/>
  <rect x="80" y="84" width="200" height="4" rx="2" fill="#94a3b8" opacity="0.4"/>
  <rect x="80" y="114" width="170" height="4" rx="2" fill="#94a3b8" opacity="0.4"/>
  <rect x="80" y="144" width="220" height="4" rx="2" fill="#94a3b8" opacity="0.3"/>
  <rect x="80" y="174" width="100" height="4" rx="2" fill="#94a3b8" opacity="0.2"/>

  <!-- Pen -->
  <g transform="translate(280, 100) rotate(35)">
    <rect x="-3" y="-50" width="6" height="60" rx="2" fill="#475569"/>
    <polygon points="-3,10 3,10 0,22" fill="#94a3b8"/>
    <rect x="-3" y="-50" width="6" height="8" rx="1" fill="#60a5fa" opacity="0.8"/>
  </g>

  <!-- Subtle corner accent -->
  <circle cx="40" cy="40" r="20" fill="#2563eb" opacity="0.08"/>
</svg>

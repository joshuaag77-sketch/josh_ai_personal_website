<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1733"/>
      <stop offset="100%" stop-color="#0f1a2e"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="240" fill="url(#bg2)"/>
  <ellipse cx="200" cy="120" rx="120" ry="80" fill="url(#glow)"/>

  <!-- Graph edges -->
  <line x1="200" y1="120" x2="120" y2="70" stroke="#00e5ff" stroke-width="1" opacity="0.3"/>
  <line x1="200" y1="120" x2="280" y2="75" stroke="#00e5ff" stroke-width="1" opacity="0.3"/>
  <line x1="200" y1="120" x2="310" y2="145" stroke="#00e5ff" stroke-width="1" opacity="0.3"/>
  <line x1="200" y1="120" x2="260" y2="185" stroke="#00e5ff" stroke-width="1" opacity="0.3"/>
  <line x1="200" y1="120" x2="140" y2="180" stroke="#00e5ff" stroke-width="1" opacity="0.3"/>
  <line x1="200" y1="120" x2="90" y2="150" stroke="#00e5ff" stroke-width="1" opacity="0.3"/>
  <line x1="120" y1="70" x2="280" y2="75" stroke="#f9a826" stroke-width="0.8" opacity="0.2"/>
  <line x1="120" y1="70" x2="90" y2="150" stroke="#00e5ff" stroke-width="0.8" opacity="0.15"/>
  <line x1="280" y1="75" x2="310" y2="145" stroke="#00e5ff" stroke-width="0.8" opacity="0.15"/>
  <line x1="310" y1="145" x2="260" y2="185" stroke="#f9a826" stroke-width="0.8" opacity="0.2"/>
  <line x1="140" y1="180" x2="260" y2="185" stroke="#00e5ff" stroke-width="0.8" opacity="0.15"/>
  <line x1="90" y1="150" x2="140" y2="180" stroke="#00e5ff" stroke-width="0.8" opacity="0.15"/>

  <!-- Outer nodes — people (cyan) -->
  <circle cx="120" cy="70" r="7" fill="#00e5ff" opacity="0.85"/>
  <circle cx="280" cy="75" r="6" fill="#00e5ff" opacity="0.75"/>
  <circle cx="310" cy="145" r="5" fill="#00e5ff" opacity="0.6"/>
  <circle cx="260" cy="185" r="6" fill="#00e5ff" opacity="0.7"/>
  <circle cx="140" cy="180" r="5" fill="#00e5ff" opacity="0.6"/>
  <circle cx="90" cy="150" r="6" fill="#00e5ff" opacity="0.75"/>

  <!-- Amber nodes — learnings / concepts -->
  <circle cx="155" cy="55" r="4" fill="#f9a826" opacity="0.7"/>
  <circle cx="330" cy="110" r="4" fill="#f9a826" opacity="0.65"/>
  <circle cx="200" cy="200" r="4" fill="#f9a826" opacity="0.65"/>
  <circle cx="70" cy="100" r="3.5" fill="#f9a826" opacity="0.6"/>

  <!-- Connecting lines to amber nodes -->
  <line x1="120" y1="70" x2="155" y2="55" stroke="#f9a826" stroke-width="0.8" opacity="0.25"/>
  <line x1="310" y1="145" x2="330" y2="110" stroke="#f9a826" stroke-width="0.8" opacity="0.25"/>
  <line x1="260" y1="185" x2="200" y2="200" stroke="#f9a826" stroke-width="0.8" opacity="0.25"/>
  <line x1="90" y1="150" x2="70" y2="100" stroke="#f9a826" stroke-width="0.8" opacity="0.25"/>

  <!-- Central hub node -->
  <circle cx="200" cy="120" r="14" fill="#162447" stroke="#00e5ff" stroke-width="1.5" opacity="0.95"/>
  <circle cx="200" cy="120" r="8" fill="#00e5ff" opacity="0.9"/>

  <!-- Label -->
  <text x="200" y="230" text-anchor="middle" font-family="monospace" font-size="9" fill="#6b7a99" letter-spacing="2">KNOWLEDGE GRAPH</text>
</svg>

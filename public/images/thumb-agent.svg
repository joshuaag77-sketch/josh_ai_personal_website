<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bg)" rx="0"/>

  <!-- Terminal window -->
  <rect x="60" y="40" width="280" height="160" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <rect x="60" y="40" width="280" height="24" rx="8" fill="#1e293b"/>
  <rect x="60" y="56" width="280" height="8" fill="#1e293b"/>
  <circle cx="78" cy="52" r="4" fill="#ef4444" opacity="0.7"/>
  <circle cx="92" cy="52" r="4" fill="#fbbf24" opacity="0.7"/>
  <circle cx="106" cy="52" r="4" fill="#22c55e" opacity="0.7"/>

  <!-- Terminal text lines -->
  <rect x="78" y="80" width="8" height="10" rx="1" fill="#22c55e" opacity="0.7"/>
  <rect x="92" y="80" width="80" height="10" rx="2" fill="#94a3b8" opacity="0.4"/>

  <rect x="78" y="100" width="8" height="10" rx="1" fill="#22c55e" opacity="0.7"/>
  <rect x="92" y="100" width="140" height="10" rx="2" fill="#60a5fa" opacity="0.5"/>

  <rect x="78" y="120" width="8" height="10" rx="1" fill="#22c55e" opacity="0.7"/>
  <rect x="92" y="120" width="100" height="10" rx="2" fill="#94a3b8" opacity="0.3"/>

  <rect x="78" y="140" width="8" height="10" rx="1" fill="#fbbf24" opacity="0.6"/>
  <rect x="92" y="140" width="60" height="10" rx="2" fill="#fbbf24" opacity="0.3"/>

  <!-- Blinking cursor -->
  <rect x="78" y="160" width="8" height="10" rx="1" fill="#22c55e" opacity="0.7"/>
  <rect x="92" y="160" width="6" height="10" rx="1" fill="#60a5fa" opacity="0.8"/>

  <!-- Subtle accent -->
  <circle cx="40" cy="40" r="20" fill="#2563eb" opacity="0.08"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bgLB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1733"/>
      <stop offset="100%" stop-color="#0f1a2e"/>
    </linearGradient>
    <radialGradient id="glowLB" cx="30%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <marker id="arrowLB" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#f9a826" opacity="0.8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="400" height="240" fill="url(#bgLB)"/>
  <ellipse cx="120" cy="105" rx="110" ry="80" fill="url(#glowLB)"/>

  <!-- LEFT: the real brain (solid graph) -->
  <line x1="120" y1="105" x2="72" y2="66" stroke="#00e5ff" stroke-width="1" opacity="0.35"/>
  <line x1="120" y1="105" x2="168" y2="70" stroke="#00e5ff" stroke-width="1" opacity="0.35"/>
  <line x1="120" y1="105" x2="70" y2="150" stroke="#00e5ff" stroke-width="1" opacity="0.35"/>
  <line x1="120" y1="105" x2="160" y2="152" stroke="#00e5ff" stroke-width="1" opacity="0.35"/>
  <line x1="72" y1="66" x2="168" y2="70" stroke="#f9a826" stroke-width="0.8" opacity="0.22"/>
  <line x1="70" y1="150" x2="160" y2="152" stroke="#00e5ff" stroke-width="0.8" opacity="0.18"/>

  <circle cx="72" cy="66" r="6" fill="#00e5ff" opacity="0.85"/>
  <circle cx="168" cy="70" r="5.5" fill="#00e5ff" opacity="0.75"/>
  <circle cx="70" cy="150" r="5.5" fill="#00e5ff" opacity="0.7"/>
  <circle cx="160" cy="152" r="5" fill="#00e5ff" opacity="0.65"/>
  <circle cx="150" cy="48" r="4" fill="#f9a826" opacity="0.7"/>
  <circle cx="52" cy="110" r="3.5" fill="#f9a826" opacity="0.6"/>

  <circle cx="120" cy="105" r="15" fill="#162447" stroke="#00e5ff" stroke-width="1.6" opacity="0.95"/>
  <circle cx="120" cy="105" r="8" fill="#00e5ff" opacity="0.9"/>

  <!-- COPY ARROW -->
  <line x1="196" y1="105" x2="252" y2="105" stroke="#f9a826" stroke-width="1.4" stroke-dasharray="5 4" opacity="0.75" marker-end="url(#arrowLB)"/>
  <text x="224" y="96" text-anchor="middle" font-family="monospace" font-size="9" fill="#f9a826" opacity="0.85" letter-spacing="1">license?</text>

  <!-- RIGHT: the copy that won't take (dashed, faded, incomplete) -->
  <line x1="312" y1="105" x2="268" y2="72" stroke="#4a5a7a" stroke-width="1" stroke-dasharray="3 4" opacity="0.5"/>
  <line x1="312" y1="105" x2="356" y2="78" stroke="#4a5a7a" stroke-width="1" stroke-dasharray="3 4" opacity="0.4"/>
  <line x1="312" y1="105" x2="300" y2="150" stroke="#4a5a7a" stroke-width="1" stroke-dasharray="3 4" opacity="0.35"/>

  <circle cx="268" cy="72" r="5.5" fill="none" stroke="#4a5a7a" stroke-width="1.2" stroke-dasharray="3 3" opacity="0.55"/>
  <circle cx="356" cy="78" r="5" fill="none" stroke="#4a5a7a" stroke-width="1.2" stroke-dasharray="3 3" opacity="0.4"/>
  <circle cx="300" cy="150" r="4.5" fill="none" stroke="#4a5a7a" stroke-width="1.2" stroke-dasharray="3 3" opacity="0.35"/>

  <circle cx="312" cy="105" r="15" fill="none" stroke="#4a5a7a" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.6"/>

  <!-- fails-to-copy mark -->
  <line x1="305" y1="98" x2="319" y2="112" stroke="#f9a826" stroke-width="1.8" opacity="0.75"/>
  <line x1="319" y1="98" x2="305" y2="112" stroke="#f9a826" stroke-width="1.8" opacity="0.75"/>

  <!-- Label -->
  <text x="200" y="228" text-anchor="middle" font-family="monospace" font-size="9" fill="#6b7a99" letter-spacing="2">YOU CAN'T LICENSE A BRAIN</text>
</svg>

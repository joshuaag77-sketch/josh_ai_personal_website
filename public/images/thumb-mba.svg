<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bg)" rx="0"/>

  <!-- Bar chart representing score progression -->
  <rect x="70" y="160" width="40" height="40" rx="3" fill="#334155" opacity="0.8"/>
  <rect x="130" y="135" width="40" height="65" rx="3" fill="#334155" opacity="0.8"/>
  <rect x="190" y="110" width="40" height="90" rx="3" fill="#475569" opacity="0.8"/>
  <rect x="250" y="80" width="40" height="120" rx="3" fill="#60a5fa" opacity="0.6"/>
  <rect x="310" y="55" width="40" height="145" rx="3" fill="#60a5fa" opacity="0.8"/>

  <!-- Upward trend line -->
  <polyline points="90,155 150,130 210,105 270,75 330,50" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <circle cx="330" cy="50" r="4" fill="#fbbf24" opacity="0.8"/>

  <!-- Labels -->
  <text x="85" y="215" font-family="sans-serif" font-size="11" fill="#64748b" text-anchor="middle">485</text>
  <text x="325" y="215" font-family="sans-serif" font-size="11" fill="#60a5fa" text-anchor="middle">655</text>

  <!-- Subtle accent -->
  <circle cx="40" cy="40" r="20" fill="#2563eb" opacity="0.08"/>
</svg>

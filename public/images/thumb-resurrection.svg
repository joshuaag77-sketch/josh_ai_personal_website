<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="70%" r="45%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bg)" rx="0"/>

  <!-- Warm glow -->
  <ellipse cx="200" cy="170" rx="180" ry="80" fill="url(#glow)"/>

  <!-- Horizon line -->
  <line x1="0" y1="175" x2="400" y2="175" stroke="#334155" stroke-width="1" opacity="0.5"/>

  <!-- Sun/light -->
  <circle cx="200" cy="170" r="18" fill="#fbbf24" opacity="0.3"/>
  <circle cx="200" cy="170" r="10" fill="#fef3c7" opacity="0.6"/>

  <!-- Three crosses -->
  <g transform="translate(155, 115)">
    <rect x="-2" y="-30" width="4" height="40" fill="#475569"/>
    <rect x="-10" y="-22" width="20" height="3.5" fill="#475569"/>
  </g>
  <g transform="translate(200, 100)">
    <rect x="-2.5" y="-40" width="5" height="52" fill="#60a5fa" opacity="0.8"/>
    <rect x="-12" y="-30" width="24" height="4" fill="#60a5fa" opacity="0.8"/>
  </g>
  <g transform="translate(245, 115)">
    <rect x="-2" y="-30" width="4" height="40" fill="#475569"/>
    <rect x="-10" y="-22" width="20" height="3.5" fill="#475569"/>
  </g>

  <!-- Stars -->
  <circle cx="80" cy="40" r="1.5" fill="#e2e8f0" opacity="0.4"/>
  <circle cx="150" cy="55" r="1" fill="#e2e8f0" opacity="0.3"/>
  <circle cx="300" cy="35" r="1.5" fill="#e2e8f0" opacity="0.4"/>
  <circle cx="340" cy="65" r="1" fill="#e2e8f0" opacity="0.3"/>
  <circle cx="60" cy="80" r="1" fill="#e2e8f0" opacity="0.2"/>

  <!-- Subtle accent -->
  <circle cx="40" cy="40" r="20" fill="#2563eb" opacity="0.08"/>
</svg>
